<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Escape</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #000; }
        .ui-panel {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border: 2px solid #fff; border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; pointer-events: auto; user-select: none;
        }
        .btn:active { background: rgba(255,255,255,0.4); }
        .btn.active { background: #f00; }
        #joystick-container { width: 150px; height: 150px; background: rgba(255,255,255,0.05); border-radius: 50%; position: relative; pointer-events: auto; }
        #joystick-stick { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 50px; left: 50px; }
        #info { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div id="info">Уровень: <span id="lvl">1</span> | Статус: <span id="status">Норма</span></div>

<div class="ui-panel">
    <div id="joystick-container">
        <div id="joystick-stick"></div>
    </div>
    <div style="display: flex; gap: 10px;">
        <div id="btn-run" class="btn">БЕГ</div>
        <div id="btn-hide" class="btn">СКРЫТЬСЯ</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const lvlDisplay = document.getElementById('lvl');
const statusDisplay = document.getElementById('status');

// Параметры игры
let tileSize = 40;
let maze = [];
let player = { x: 0, y: 0, targetX: 0, targetY: 0, size: 20, isHidden: false, isRunning: false };
let enemies = [];
let exit = { x: 0, y: 0 };
let currentLevelIndex = 0;
let noiseRadius = 0;

const levels = [
    { cols: 11, rows: 11, enemies: 1, speed: 1.5 },
    { cols: 15, rows: 15, enemies: 2, speed: 2.0 },
    { cols: 19, rows: 19, enemies: 3, speed: 2.5 }
];

// Управление джойстиком
let moveDir = { x: 0, y: 0 };
const stick = document.getElementById('joystick-stick');
const container = document.getElementById('joystick-container');

// Инициализация уровня
function initLevel(config) {
    tileSize = Math.min(window.innerWidth / config.cols, (window.innerHeight - 200) / config.rows);
    canvas.width = config.cols * tileSize;
    canvas.height = config.rows * tileSize;
    
    // Генерация пустой карты с границами
    maze = [];
    for(let y=0; y<config.rows; y++){
        maze[y] = [];
        for(let x=0; x<config.cols; x++){
            const isWall = x === 0 || y === 0 || x === config.cols-1 || y === config.rows-1 || (Math.random() < 0.2);
            const isLocker = !isWall && Math.random() < 0.05;
            maze[y][x] = isWall ? 1 : (isLocker ? 2 : 0);
        }
    }

    // Игрок и выход
    maze[1][1] = 0;
    player.x = 1.5 * tileSize;
    player.y = 1.5 * tileSize;
    
    exit = { x: config.cols - 2, y: config.rows - 2 };
    maze[exit.y][exit.x] = 3;

    // Враги
    enemies = [];
    for(let i=0; i<config.enemies; i++) {
        enemies.push({
            x: (config.cols - 2) * tileSize,
            y: (config.rows - 2) * tileSize,
            speed: config.speed,
            dirX: Math.random() > 0.5 ? 1 : -1,
            dirY: 0
        });
    }
    lvlDisplay.innerText = currentLevelIndex + 1;
}

// Рендеринг
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Стены и укрытия
    for(let y=0; y<maze.length; y++) {
        for(let x=0; x<maze[y].length; x++) {
            if(maze[y][x] === 1) ctx.fillStyle = '#444'; 
            else if(maze[y][x] === 2) ctx.fillStyle = '#0f0';
            else if(maze[y][x] === 3) ctx.fillStyle = '#ff0';
            else ctx.fillStyle = '#111';
            
            if(maze[y][x] !== 0) {
                ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
            }
        }
    }

    // Шум
    if (noiseRadius > 0) {
        ctx.beginPath();
        ctx.arc(player.x, player.y, noiseRadius, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.stroke();
    }

    // Игрок
    if(!player.isHidden) {
        ctx.fillStyle = player.isRunning ? '#f80' : '#0cf';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2);
        ctx.fill();
    }

    // Враги
    ctx.fillStyle = 'red';
    enemies.forEach(e => {
        ctx.beginPath();
        ctx.arc(e.x, e.y, player.size/2, 0, Math.PI*2);
        ctx.fill();
    });
}

function update() {
    if(player.isHidden) return;

    // Движение игрока
    const speed = player.isRunning ? 4 : 2;
    noiseRadius = player.isRunning ? 100 : (moveDir.x || moveDir.y ? 40 : 0);

    let nextX = player.x + moveDir.x * speed;
    let nextY = player.y + moveDir.y * speed;

    // Столкновения со стенами
    const gridX = Math.floor(nextX / tileSize);
    const gridY = Math.floor(nextY / tileSize);

    if (maze[gridY] && maze[gridY][gridX] !== 1) {
        player.x = nextX;
        player.y = nextY;
    }

    // Проверка выхода
    if (gridX === exit.x && gridY === exit.y) {
        currentLevelIndex++;
        if(currentLevelIndex < levels.length) initLevel(levels[currentLevelIndex]);
        else alert("Победа!");
    }

    // Логика врагов
    enemies.forEach(e => {
        // Простое движение
        let nx = e.x + e.dirX * e.speed;
        let ny = e.y + e.dirY * e.speed;
        
        let gx = Math.floor(nx / tileSize);
        let gy = Math.floor(ny / tileSize);

        if (maze[gy] && maze[gy][gx] === 1) {
            e.dirX *= -1; e.dirY = (Math.random() - 0.5) * 2;
        } else {
            e.x = nx; e.y = ny;
        }

        // Поимка игрока
        const dist = Math.hypot(player.x - e.x, player.y - e.y);
        if (!player.isHidden && (dist < 25 || (dist < noiseRadius))) {
            if(dist < 25) { 
                alert("Вас поймали!"); 
                initLevel(levels[currentLevelIndex]); 
            } else {
                // Враг идет на шум
                e.x += (player.x - e.x) * 0.02;
                e.y += (player.y - e.y) * 0.02;
            }
        }
    });
}

// Управление тачем
container.addEventListener('touchstart', e => handleStick(e));
container.addEventListener('touchmove', e => handleStick(e));
container.addEventListener('touchend', () => {
    moveDir = { x: 0, y: 0 };
    stick.style.transform = `translate(0px, 0px)`;
});

function handleStick(e) {
    const rect = container.getBoundingClientRect();
    const touch = e.touches[0];
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;
    const dx = touch.clientX - centerX;
    const dy = touch.clientY - centerY;
    const dist = Math.min(50, Math.hypot(dx, dy));
    const angle = Math.atan2(dy, dx);
    
    moveDir.x = Math.cos(angle) * (dist / 50);
    moveDir.y = Math.sin(angle) * (dist / 50);
    
    stick.style.transform = `translate(${moveDir.x * 50}px, ${moveDir.y * 50}px)`;
}

document.getElementById('btn-run').onclick = function() {
    player.isRunning = !player.isRunning;
    this.classList.toggle('active');
};

document.getElementById('btn-hide').onclick = function() {
    const gx = Math.floor(player.x / tileSize);
    const gy = Math.floor(player.y / tileSize);
    if (maze[gy][gx] === 2) {
        player.isHidden = !player.isHidden;
        statusDisplay.innerText = player.isHidden ? "В укрытии" : "Норма";
        this.classList.toggle('active');
    }
};

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

initLevel(levels[0]);
gameLoop();

</script>
</body>
</html>
