<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Simply</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-page: #121212;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --border-light: rgba(84, 84, 88, 0.4);
            --accent-color: #0a84ff;
            --input-bg: #1c1c1e;
        }

        body.accent-blue { --accent-color: #0a84ff; }
        body.accent-purple { --accent-color: #a47ae2; }
        body.accent-pink { --accent-color: #ff4d7a; }
        body.accent-mint { --accent-color: #6fcf97; }
        body.accent-orange { --accent-color: #ff7000; }
        body.accent-yellow { --accent-color: #ffaa00; }
        body.accent-teal { --accent-color: #00e5d9; }
        body.accent-red { --accent-color: #ff6b6b; }
        body.accent-indigo { --accent-color: #5856d6; }
        body.accent-beige { --accent-color: #d4a373; }
        body.accent-gray { --accent-color: #8e8e93; }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-page);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 25vh;
            z-index: 2000;
            overflow: hidden;
        }

        .login-card {
            background: var(--input-bg);
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border-light);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .login-card h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 590;
        }

        .login-card input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: #2c2c2e;
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .login-card input:focus {
            border-color: var(--accent-color);
        }

        .login-card button {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent-color);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .login-card .error {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-page);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-item {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .message-nick {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .nick-main {
            color: var(--text-secondary);
        }
        .own-message .nick-main {
            color: var(--accent-color);
        }
        .nick-tag {
            color: #6c6c70;
            font-weight: 400;
            font-size: 0.7rem;
        }
        .message-text {
            font-size: 1rem;
            line-height: 1.4;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message-divider {
            margin-top: 8px;
            height: 1px;
            background-color: rgba(84, 84, 88, 0.4);
            width: 100%;
        }

        .input-wrapper {
            background: var(--input-bg);
            border-top: 1px solid rgba(84, 84, 88, 0.6);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 0.9rem 1rem;
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .settings-btn svg {
            width: 1.5rem;
            height: 1.5rem;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .input-row textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.75rem 0;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            resize: none;
            overflow-y: hidden;
            font-family: inherit;
            line-height: 1.4;
            max-height: 120px;
        }

        .send-btn {
            background: var(--accent-color);
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 2rem;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1c1c1e;
            border-radius: 2rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 340px;
            border: 0.5px solid rgba(84, 84, 88, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .modal-content h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            font-weight: 590;
            color: white;
        }

        .modal-setting {
            margin-bottom: 1.2rem;
        }

        .modal-setting label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #8e8e93;
        }

        .modal-setting input, .modal-setting select {
            width: 100%;
            padding: 0.6rem 1rem;
            background: #2c2c2e;
            border: 0.5px solid rgba(84, 84, 88, 0.4);
            border-radius: 1rem;
            font-size: 1rem;
            color: white;
        }

        .modal-close {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 0.7rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 590;
            cursor: pointer;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h2>Simply</h2>
        <input type="text" id="loginNick" placeholder="Ник" autocomplete="off">
        <input type="text" id="loginPin" placeholder="PIN (4 цифры)" maxlength="4" inputmode="numeric" pattern="\d*" autocomplete="off">
        <button id="loginBtn">Войти</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="appContainer" class="app-container" style="display: none;">
    <div class="chat-messages" id="messagesContainer"></div>
    <div class="input-wrapper">
        <div class="input-row">
            <button class="settings-btn" id="settingsBtn">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">+</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Настройки</h3>
        <div class="modal-setting">
            <label>Новый ник</label>
            <input type="text" id="newNickInput" placeholder="Новый ник">
            <label style="margin-top: 8px;">PIN для подтверждения</label>
            <input type="password" id="confirmPinForNick" placeholder="PIN" maxlength="4" inputmode="numeric" pattern="\d*">
        </div>
        <div class="modal-setting">
            <label>Новый PIN (4 цифры)</label>
            <input type="password" id="newPinInput" placeholder="Новый PIN" maxlength="4" inputmode="numeric" pattern="\d*">
            <label>Старый PIN</label>
            <input type="password" id="oldPinInput" placeholder="Старый PIN" maxlength="4" inputmode="numeric" pattern="\d*">
        </div>
        <div class="modal-setting">
            <label>Оттенок</label>
            <select id="accentSelect">
                <option value="blue">Синий</option>
                <option value="purple">Фиолетовый</option>
                <option value="pink">Розовый</option>
                <option value="mint">Мятный</option>
                <option value="orange">Оранжевый</option>
                <option value="yellow">Жёлтый</option>
                <option value="teal">Бирюзовый</option>
                <option value="red">Красный</option>
                <option value="indigo">Индиго</option>
                <option value="beige">Бежевый</option>
                <option value="gray">Светло-серый</option>
            </select>
        </div>
        <button class="modal-close" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    let socket = null;
    let currentUser = { full_nick: "" };
    let messages = [];
    let authToken = localStorage.getItem('simply_token');
    let appSettings = JSON.parse(localStorage.getItem('simply_settings')) || { accent: 'blue' };

    function applyAccent(accent) {
        const classes = ['accent-blue', 'accent-purple', 'accent-pink', 'accent-mint', 'accent-orange', 'accent-yellow', 'accent-teal', 'accent-red', 'accent-indigo', 'accent-beige', 'accent-gray'];
        document.body.classList.remove(...classes);
        if (accent === 'blue') document.body.classList.add('accent-blue');
        else if (accent === 'purple') document.body.classList.add('accent-purple');
        else if (accent === 'pink') document.body.classList.add('accent-pink');
        else if (accent === 'mint') document.body.classList.add('accent-mint');
        else if (accent === 'orange') document.body.classList.add('accent-orange');
        else if (accent === 'yellow') document.body.classList.add('accent-yellow');
        else if (accent === 'teal') document.body.classList.add('accent-teal');
        else if (accent === 'red') document.body.classList.add('accent-red');
        else if (accent === 'indigo') document.body.classList.add('accent-indigo');
        else if (accent === 'beige') document.body.classList.add('accent-beige');
        else if (accent === 'gray') document.body.classList.add('accent-gray');
        appSettings.accent = accent;
        localStorage.setItem('simply_settings', JSON.stringify(appSettings));
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    function splitFullNick(full) {
        const lastHash = full.lastIndexOf('#');
        if (lastHash === -1) return { nick: full, tag: '' };
        return { nick: full.substring(0, lastHash), tag: full.substring(lastHash) };
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        container.innerHTML = '';
        messages.forEach(msg => {
            const isOwn = currentUser && msg.full_nick === currentUser.full_nick;
            const { nick, tag } = splitFullNick(msg.full_nick);
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-item';
            if (isOwn) msgDiv.classList.add('own-message');
            msgDiv.innerHTML = `
                <div class="message-nick">
                    <span class="nick-main">${escapeHtml(nick)}</span>
                    <span class="nick-tag">${escapeHtml(tag)}</span>
                </div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                <div class="message-divider"></div>
            `;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function loadHistory() {
        try {
            const res = await fetch('/messages');
            const data = await res.json();
            messages = data;
            renderMessages();
        } catch(e) { console.error(e); }
    }

    async function authWithPin(nick, pin) {
        try {
            const res = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nick, pin })
            });
            const data = await res.json();
            if (data.success) {
                currentUser.full_nick = data.full_nick;
                authToken = data.token;
                localStorage.setItem('simply_token', authToken);
                localStorage.setItem('simply_nick', nick);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                if (socket) socket.disconnect();
                socket = io();
                socket.on('message received', (newMsg) => {
                    messages.push(newMsg);
                    renderMessages();
                });
                socket.on('message deleted', (msgId) => {
                    messages = messages.filter(m => m.id !== msgId);
                    renderMessages();
                });
                socket.on('nick changed', ({ oldFullNick, newFullNick }) => {
                    messages.forEach(msg => {
                        if (msg.full_nick === oldFullNick) msg.full_nick = newFullNick;
                    });
                    if (currentUser.full_nick === oldFullNick) currentUser.full_nick = newFullNick;
                    renderMessages();
                });
                await loadHistory();
                return true;
            } else {
                document.getElementById('loginError').innerText = data.error || 'Ошибка входа';
                return false;
            }
        } catch(e) {
            document.getElementById('loginError').innerText = 'Ошибка соединения';
            return false;
        }
    }

    async function verifyToken() {
        const token = localStorage.getItem('simply_token');
        if (!token) return false;
        try {
            const res = await fetch('/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success) {
                currentUser.full_nick = data.full_nick;
                authToken = token;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                if (socket) socket.disconnect();
                socket = io();
                socket.on('message received', (newMsg) => {
                    messages.push(newMsg);
                    renderMessages();
                });
                socket.on('message deleted', (msgId) => {
                    messages = messages.filter(m => m.id !== msgId);
                    renderMessages();
                });
                socket.on('nick changed', ({ oldFullNick, newFullNick }) => {
                    messages.forEach(msg => {
                        if (msg.full_nick === oldFullNick) msg.full_nick = newFullNick;
                    });
                    if (currentUser.full_nick === oldFullNick) currentUser.full_nick = newFullNick;
                    renderMessages();
                });
                await loadHistory();
                return true;
            }
        } catch(e) {}
        return false;
    }

    async function changeNick() {
        const newNick = document.getElementById('newNickInput').value.trim();
        const pin = document.getElementById('confirmPinForNick').value;
        if (!newNick || !pin) { alert('Заполните новый ник и PIN'); return; }
        const res = await fetch('/change-nick', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: authToken, newNick, pin })
        });
        const data = await res.json();
        if (data.success) {
            alert('Ник изменён');
            document.getElementById('newNickInput').value = '';
            document.getElementById('confirmPinForNick').value = '';
        } else {
            alert(data.error || 'Ошибка');
        }
    }

    async function changePin() {
        const oldPin = document.getElementById('oldPinInput').value;
        const newPin = document.getElementById('newPinInput').value;
        if (!oldPin || !newPin || newPin.length !== 4 || !/^\d+$/.test(newPin)) {
            alert('PIN должен быть 4 цифры');
            return;
        }
        const res = await fetch('/change-pin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: authToken, oldPin, newPin })
        });
        const data = await res.json();
        if (data.success) {
            alert('PIN изменён');
            document.getElementById('oldPinInput').value = '';
            document.getElementById('newPinInput').value = '';
        } else {
            alert(data.error || 'Ошибка');
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value;
        if (!text.trim() || !socket || !currentUser.full_nick) return;
        socket.emit('new message', { full_nick: currentUser.full_nick, text });
        input.value = '';
        input.style.height = 'auto';
        input.focus();
    }

    function autoResizeTextarea() {
        const textarea = document.getElementById('messageInput');
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    window.onload = async () => {
        applyAccent(appSettings.accent);
        document.getElementById('accentSelect').value = appSettings.accent;
        document.getElementById('accentSelect').onchange = (e) => applyAccent(e.target.value);

        const logged = await verifyToken();
        if (!logged) {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        } else {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
        }

        document.getElementById('loginBtn').onclick = () => {
            const nick = document.getElementById('loginNick').value.trim();
            const pin = document.getElementById('loginPin').value;
            if (!nick || !pin || pin.length !== 4 || !/^\d+$/.test(pin)) {
                document.getElementById('loginError').innerText = 'Введите ник и 4-значный PIN';
                return;
            }
            authWithPin(nick, pin);
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        const msgInput = document.getElementById('messageInput');
        msgInput.addEventListener('input', autoResizeTextarea);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const start = msgInput.selectionStart;
                const end = msgInput.selectionEnd;
                msgInput.value = msgInput.value.substring(0, start) + '\n' + msgInput.value.substring(end);
                msgInput.selectionStart = msgInput.selectionEnd = start + 1;
                autoResizeTextarea();
            }
        });

        const modal = document.getElementById('settingsModal');
        document.getElementById('settingsBtn').onclick = () => {
            modal.style.display = 'flex';
        };
        document.getElementById('closeModalBtn').onclick = async () => {
            await changeNick();
            await changePin();
            modal.style.display = 'none';
        };
        window.onclick = (e) => {
            if (e.target === modal) {
                changeNick();
                changePin();
                modal.style.display = 'none';
            }
        };
    };
</script>
</body>
</html>
