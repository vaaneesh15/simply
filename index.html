<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1c1c1e" id="themeColorMeta">
    <title>ChatX</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "22366383-4ee8-4a91-b727-1c11e6bdc218",
        });
        const permission = await OneSignal.Notifications.permission;
        if (permission === 'default') {
          await OneSignal.Slidedown.promptPush();
        }
      });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-touch-callout: none;
        }
        html {
            font-size: 1.1rem;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: fixed;
            width: 100%;
        }
        :root {
            --bg-page: #121212;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --border-light: rgba(84,84,88,0.4);
            --accent-color: #0a84ff;
            --input-bg: #1c1c1e;
            --accent-rgb: 10, 132, 255;
        }
        button, .clickable {
            cursor: pointer;
            transition: all 0.05s ease;
        }
        button:active, .clickable:active,
        button.tapped, .clickable.tapped {
            opacity: 0.6;
            transform: scale(0.97);
        }

        .login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-page); display: flex; align-items: flex-start; justify-content: center;
            padding-top: 25vh; z-index:2000; overflow: hidden;
        }
        .login-card {
            background: var(--input-bg); border-radius: 2rem; padding: 2rem; width:90%; max-width:350px;
            border:1px solid var(--border-light); box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }
        .login-card h2 { margin-bottom:1.5rem; text-align:center; font-weight:590; font-size:1.8rem; }
        .login-card input {
            width:100%; padding:0.9rem; margin-bottom:1rem; background: var(--bg-page);
            border:1px solid var(--border-light); border-radius:1rem; color:var(--text-primary); font-size:1rem; outline:none;
        }
        .login-card input:focus { border-color:var(--accent-color); }
        .login-card button {
            width:100%; padding:0.9rem; background:var(--accent-color); border:none;
            border-radius:1rem; color:white; font-weight:600; font-size:1rem;
        }
        .login-card .error { color:#ff6b6b; font-size:0.8rem; margin-top:0.5rem; text-align:center; }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-page);
            position: relative;
            overflow: hidden;
        }

        /* Панели вкладок */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: 5rem;
        }
        .panel-header {
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 1rem;
        }
        .panel-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        /* Нижняя навигация */
        .nav-bar {
            display: flex;
            background: var(--input-bg);
            border-top: 1px solid var(--border-light);
            padding: 0.5rem 0;
            padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0px));
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .nav-bar.hidden {
            display: none;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            padding: 0.3rem;
            border-radius: 0.5rem;
            transition: all 0.1s;
        }
        .nav-item.active {
            color: var(--accent-color);
        }
        .nav-item svg {
            width: 1.5rem;
            height: 1.5rem;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
        }

        /* Чат вьюха */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-page);
            z-index: 50;
        }
        .chat-header {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border-bottom: 1px solid var(--border-light);
            border-top: 1px solid var(--border-light); /* добавлена верхняя полоска */
        }
        .back-btn {
            background: var(--bg-page);
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.8rem;
            cursor: pointer;
            border: 0.5px solid var(--border-light);
        }
        .chat-header-info {
            flex: 1;
        }
        .chat-header-name {
            font-weight: 600;
        }
        .chat-header-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message-item {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
            background: transparent;
        }
        .message-text.highlight {
            color: var(--accent-color);
            transition: color 0.2s;
        }
        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }
        .message-nick {
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: baseline;
            gap: 0;
            cursor: pointer;
        }
        .nick-main { color: var(--text-secondary); }
        .own-message .nick-main { color: var(--accent-color); }
        .nick-tag { color:#6c6c70; font-weight:400; font-size:0.8rem; }
        .message-actions-btn {
            position: absolute; right: 0; top: 0;
            background: none; border: none;
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 16px;
            color: var(--text-secondary);
        }
        .message-actions-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
        .reply-context {
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 2px solid var(--accent-color);
            cursor: pointer;
        }
        .reply-context .reply-nick {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 600;
        }
        .reply-context .reply-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message-text { 
            font-size:1rem; line-height:1.4; color:var(--text-primary); 
            white-space:pre-wrap; word-break:break-word; 
        }
        .message-text a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .message-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .footer-right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .reaction-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2rem;
            background: var(--input-bg);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .reaction-btn svg {
            width: 1.1rem;
            height: 1.1rem;
            fill: #ff375f;
            stroke: #ff375f;
        }
        .reactions-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-left: 0;
        }
        .reaction-badge {
            background: var(--input-bg);
            border-radius: 2rem;
            padding: 4px 10px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border: 0.5px solid var(--border-light);
        }
        .reaction-badge .reaction-count {
            color: var(--text-secondary);
        }
        .reaction-badge.user-reacted .reaction-count {
            color: var(--accent-color);
        }
        .edited-badge {
            font-size:0.75rem;
            color:var(--text-secondary);
            font-style:italic;
        }
        .message-divider {
            margin-top: 10px;
            height: 1px;
            background-color: var(--border-light);
            width: 100%;
        }

        .typing-indicator {
            background: var(--input-bg);
            border-top: 1px solid var(--border-light);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .typing-indicator.hidden {
            display: none;
        }

        .input-wrapper {
            background: var(--input-bg);
            border-top: 1px solid var(--border-light);
            padding-bottom: env(safe-area-inset-bottom,0);
        }
        .input-row {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 1rem 1rem;
        }
        .input-row textarea {
            flex:1; background:transparent; border:none; padding:0.8rem 0; font-size:1rem;
            color:var(--text-primary); outline:none; resize: none; 
            font-family:inherit; line-height:1.4; max-height:150px; overflow-y: auto;
        }
        .send-btn {
            background:var(--accent-color); border:none; width:2.8rem; height:2.8rem; border-radius:2rem;
            color:white; font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .reply-indicator, .edit-indicator {
            margin: 0.5rem 1rem 0;
            background: var(--input-bg);
            border-left: 2px solid var(--accent-color);
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0.5rem 0.8rem;
            position: relative;
        }
        .reply-indicator::before, .edit-indicator::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--border-light);
        }
        .reply-indicator .reply-content, .edit-indicator .edit-content {
            flex: 1;
            overflow: hidden;
        }
        .reply-indicator .reply-nick, .edit-indicator .edit-label {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 600;
        }
        .reply-indicator .reply-text, .edit-indicator .edit-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cancel-reply, .cancel-edit {
            background: var(--bg-page);
            border: none;
            border-radius: 1rem;
            width: 2.2rem;
            height: 2.2rem;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
        }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background-color:rgba(0,0,0,0.7); backdrop-filter:blur(12px); z-index:10000;
            justify-content:center; align-items:center;
        }
        .modal.modal-top {
            z-index: 10001;
        }
        .modal.fullscreen {
            background: var(--bg-page);
            backdrop-filter: none;
            align-items: flex-start;
            padding-top: 0.5rem;
        }
        .modal-content {
            background:var(--input-bg); border-radius:2rem; padding:1.8rem; width:90%; max-width:380px;
            border:0.5px solid var(--border-light); box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }
        .fullscreen .modal-content {
            width: 100%;
            max-width: 100%;
            border-radius: 0;
            background: var(--bg-page);
            box-shadow: none;
            border: none;
            padding: 1rem;
        }
        .modal-content h3 { margin-bottom:1.2rem; font-size:1.4rem; font-weight:590; color:var(--text-primary); }
        .modal-setting { margin-bottom:1.2rem; }
        .modal-setting label { display:block; margin-bottom:0.5rem; font-weight:500; font-size:0.9rem; color:var(--text-secondary); }
        .modal-setting input {
            width:100%; padding:0.7rem 1rem; background:var(--bg-page); border:0.5px solid var(--border-light);
            border-radius:1rem; font-size:1rem; color:var(--text-primary); outline:none;
        }
        .modal-buttons { display:flex; gap:12px; margin-top:1.5rem; }
        .modal-buttons button {
            flex:1; padding:0.8rem; border-radius:1rem; font-weight:590; cursor:pointer; border:1px solid var(--border-light);
            font-size:0.9rem; background: var(--bg-page); color: var(--text-primary);
        }
        .modal-buttons button:last-child { background: var(--bg-page); color: var(--text-primary); border:1px solid var(--border-light); }

        .context-menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .context-menu-buttons button {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            font-size: 1rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }
        .context-menu-buttons button:active {
            background: rgba(128,128,128,0.2);
        }
        .context-menu-buttons svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }
        .context-message-nick {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .context-message-preview {
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 0.5rem 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .reactions-picker {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.6rem;
            justify-items: center;
            margin-bottom: 1.2rem;
        }
        .reactions-picker button {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 1rem;
        }

        .settings-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 0.9rem;
            padding-top: 0.3rem;
        }
        .setting-row:last-of-type {
            border-bottom: none;
        }
        .setting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-label {
            font-size: 1rem;
            color: var(--text-primary);
        }
        .setting-value {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .nick-readonly {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            width: 100%;
            text-align: left;
        }
        .setting-row button {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.6rem 1.2rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2c2c2e;
            transition: 0.2s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--accent-color);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Списки друзей и чатов */
        .friend-item, .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border-light);
        }
        .friend-info, .chat-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .friend-name {
            font-weight: 500;
        }
        .chat-preview {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .chat-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: 8px;
            white-space: nowrap;
        }
        .friend-actions {
            display: flex;
            gap: 8px;
        }
        .friend-actions button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            padding: 0.3rem;
        }
        .segment-control {
            display: flex;
            background: var(--input-bg);
            border-radius: 0.8rem;
            padding: 0.2rem;
            margin-bottom: 1rem;
        }
        .segment-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 0.5rem;
            border-radius: 0.6rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .segment-btn.active {
            background: var(--bg-page);
            color: var(--text-primary);
        }
        .search-input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        /* Кнопка Подружиться внизу */
        .add-friend-btn {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 4.5rem;
            border-top: 1px solid var(--border-light);
            padding-top: 1rem;
        }
        .add-friend-btn svg {
            width: 1.4rem;
            height: 1.4rem;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        /* Иконки в профиле */
        .profile-menu-btn {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            width: 100%;
        }
        .profile-menu-btn svg {
            width: 1.4rem;
            height: 1.4rem;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        /* Круглая кнопка назад в полноэкранных модалках */
        .modal-back-btn {
            background: var(--bg-page);
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 0.5px solid var(--border-light);
        }

        /* Меню чата */
        .chat-menu-modal .modal-content {
            max-width: 320px;
        }
        .chat-menu-btn {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            color: var(--text-secondary);
        }
        .chat-menu-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Иконка значка пользователя */
        .user-badge {
            margin-right: 4px;
            font-size: 1.1rem;
        }
        /* Иконка pin в закрепленном чате */
        .pinned-icon {
            margin-right: 4px;
            width: 14px;
            height: 14px;
            stroke: var(--accent-color);
            stroke-width: 2;
            fill: none;
        }

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<!-- Далее будет JavaScript -->
<script>
    (function() {
        function addTapped(e) { const t = e.target.closest('button, .clickable'); if(t) t.classList.add('tapped'); }
        function removeTapped(e) { const t = e.target.closest('button, .clickable'); if(t) t.classList.remove('tapped'); }
        document.addEventListener('touchstart', addTapped, {passive: true});
        document.addEventListener('touchend', removeTapped);
        document.addEventListener('touchcancel', removeTapped);
        document.addEventListener('mousedown', addTapped);
        document.addEventListener('mouseup', removeTapped);
        document.addEventListener('mouseleave', removeTapped);
    })();

    // --- Глобальное состояние ---
    let socket = null;
    let currentUser = { full_nick: "" };
    let authToken = localStorage.getItem('simply_token');
    let appSettings = JSON.parse(localStorage.getItem('simply_settings')) || { 
        showDate: true, 
        showReactions: true, 
        notifications: true, 
        accentColor: '#0a84ff', 
        userBadge: '' 
    };
    
    let messages = [];
    let currentChat = { id: null, type: null, other: null, name: '' };
    let chatsList = [];
    let pinnedChats = JSON.parse(localStorage.getItem('pinned_chats')) || [];
    let friendsData = { accepted: [], incoming: [], outgoing: [] };
    let friendsFilter = 'accepted';
    let friendsSearchQuery = '';
    let chatSearchQuery = '';
    let editingMessage = null;
    let pendingDeleteMessageId = null;
    let currentReactionMessage = null;
    let replyingTo = null;
    let typingTimeout = null;
    let refreshInterval = null;
    let pendingAction = null;
    let selectedChatForMenu = null;
    const onlineUsers = new Set();

    document.documentElement.style.setProperty('--accent-color', appSettings.accentColor);

    // --- Вспомогательные функции ---
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function splitFullNick(full) { const h=full.lastIndexOf('#'); if(h===-1) return {nick:full,tag:''}; return {nick:full.slice(0,h),tag:full.slice(h)}; }
    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color: var(--accent-color); text-decoration: underline;">${url}</a>`);
    }
    function formatTimestamp(isoString, showDate) {
        const date = new Date(isoString);
        const hours = String(date.getHours()).padStart(2,'0');
        const minutes = String(date.getMinutes()).padStart(2,'0');
        if (showDate) {
            const day = String(date.getDate()).padStart(2,'0');
            const month = String(date.getMonth()+1).padStart(2,'0');
            const year = date.getFullYear();
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        } else {
            return `${hours}:${minutes}`;
        }
    }

    function setOneSignalUserId(userId) {
        if (window.OneSignalDeferred) {
            OneSignalDeferred.push(async function(OneSignal) {
                await OneSignal.login(userId);
            });
        }
    }

    // --- Навигация ---
    function showTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        document.getElementById(tabId + 'Panel').style.display = 'flex';
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tabId);
        });
        if (tabId === 'friends') {
            document.getElementById('friendsSearchInput').value = '';
            friendsSearchQuery = '';
            loadFriends();
        } else if (tabId === 'chats') {
            document.getElementById('chatSearchInput').value = '';
            chatSearchQuery = '';
            loadChatsList();
            document.getElementById('userSearchResults').innerHTML = '';
        }
        else if (tabId === 'profile') {
            document.getElementById('profileNickDisplay').innerText = currentUser.full_nick;
        }
        if (currentChat.id) closeChatView();
    }

    function closeChatView() {
        document.getElementById('chatView').style.display = 'none';
        document.getElementById('mainNavBar').classList.remove('hidden');
        if (currentChat.id) {
            socket.emit('leave chat', currentChat.id);
            currentChat = { id: null, type: null, other: null, name: '' };
        }
        showTab('chats');
    }

    // --- Работа с чатами ---
    async function loadChatsList() {
        try {
            const res = await fetch(`/chats?full_nick=${encodeURIComponent(currentUser.full_nick)}`);
            chatsList = await res.json();
            chatsList.forEach(c => { c.pinned = pinnedChats.includes(c.id); });
            renderChatsList();
        } catch(e) { console.error(e); }
    }

    function renderChatsList() {
        const container = document.getElementById('chatsListContainer');
        const query = chatSearchQuery.toLowerCase();
        let filtered = chatsList.filter(c => c.type === 'public' || c.type === 'notebook' || c.name.toLowerCase().includes(query));
        filtered.sort((a, b) => {
            if (a.type === 'public') return -1;
            if (b.type === 'public') return 1;
            if (a.type === 'notebook') return -1;
            if (b.type === 'notebook') return 1;
            if (a.pinned && !b.pinned) return -1;
            if (!a.pinned && b.pinned) return 1;
            const aTime = a.last_message ? new Date(a.last_message.created_at).getTime() : 0;
            const bTime = b.last_message ? new Date(b.last_message.created_at).getTime() : 0;
            return bTime - aTime;
        });
        let html = '';
        filtered.forEach(chat => {
            let preview = '';
            let timeStr = '';
            if (chat.last_message) {
                const isOwn = chat.last_message.full_nick === currentUser.full_nick;
                const prefix = isOwn ? 'Вы: ' : (chat.type==='private' ? '' : splitFullNick(chat.last_message.full_nick).nick+': ');
                preview = prefix + (chat.last_message.text.length > 30 ? chat.last_message.text.substring(0,30)+'…' : chat.last_message.text);
                timeStr = formatTimestamp(chat.last_message.created_at, appSettings.showDate);
            }
            const pinnedIcon = chat.pinned ? '<svg class="pinned-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20M5 12h14"/></svg>' : '';
            html += `<div class="chat-item clickable" data-chat-id="${chat.id}" data-chat-type="${chat.type}" data-other="${chat.other||''}" data-name="${escapeHtml(chat.name)}">
                <div class="chat-info">
                    ${pinnedIcon}
                    <div style="flex:1">
                        <div class="friend-name">${escapeHtml(chat.name)}</div>
                        <div class="chat-preview">${escapeHtml(preview)}<span class="chat-time">${timeStr}</span></div>
                    </div>
                </div>`;
            if (chat.type === 'private') {
                html += `<button class="message-actions-btn chat-menu-btn" style="position:relative; right:auto; top:auto;" data-chat-id="${chat.id}" data-other="${chat.other}">⋮</button>`;
            }
            html += `</div>`;
        });
        container.innerHTML = html || '<div style="color:var(--text-secondary); text-align:center;">Нет чатов</div>';
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.closest('.chat-menu-btn')) return;
                const chat = {
                    id: parseInt(el.dataset.chatId),
                    type: el.dataset.chatType,
                    other: el.dataset.other || null,
                    name: el.dataset.name
                };
                openChat(chat);
            });
        });
        document.querySelectorAll('.chat-menu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const chatId = parseInt(btn.dataset.chatId);
                const other = btn.dataset.other;
                selectedChatForMenu = { chatId, other };
                openChatMenu(chatId, other);
            });
        });
    }

    async function openChat(chat) {
        currentChat = chat;
        document.getElementById('chatsPanel').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
        document.getElementById('mainNavBar').classList.add('hidden');
        document.getElementById('chatTitle').innerText = chat.name;
        document.getElementById('chatStatus').innerText = (chat.type === 'public' || chat.type === 'notebook') ? '' : 'загрузка...';
        if (chat.type === 'private' && chat.other) {
            updateChatStatus(chat.other);
        }
        socket.emit('join chat', chat.id);
        messages = [];
        renderMessages();
        await loadChatMessages();
        renderMessages();
    }

    async function loadChatMessages() {
        if (!currentChat.id) return;
        try {
            const res = await fetch(`/chat-messages?chat_id=${currentChat.id}&full_nick=${encodeURIComponent(currentUser.full_nick)}`);
            messages = await res.json();
        } catch(e) { console.error(e); }
    }

    function updateChatStatus(full_nick) {
        const isOnline = onlineUsers.has(full_nick);
        document.getElementById('chatStatus').innerText = isOnline ? 'В сети' : 'Не в сети';
    }

    // --- Меню чата ---
    async function openChatMenu(chatId, other) {
        if (!other) return;
        document.getElementById('chatMenuNick').innerText = other;
        const btn = document.getElementById('chatMenuFriend');
        const span = document.getElementById('chatMenuFriendText');
        
        const res = await fetch(`/friendship-status?from=${encodeURIComponent(currentUser.full_nick)}&to=${encodeURIComponent(other)}`);
        const data = await res.json();
        
        if (data.status === 'accepted') {
            span.innerText = 'Друзья';
            btn.style.opacity = '1';
            btn.onclick = null;
        } else if (data.status === 'pending') {
            if (data.isOutgoing) {
                span.innerText = 'Хочу дружить';
                btn.style.opacity = '0.5';
                btn.onclick = null;
            } else {
                span.innerText = 'Хочет дружить';
                btn.style.opacity = '0.5';
                btn.onclick = null;
            }
        } else {
            span.innerText = 'Добавить в друзья';
            btn.style.opacity = '1';
            btn.onclick = async () => {
                await sendFriendRequest(other);
                document.getElementById('chatMenuModal').style.display = 'none';
            };
        }
        
        document.getElementById('chatMenuPin').onclick = () => {
            const index = pinnedChats.indexOf(chatId);
            if (index === -1) pinnedChats.push(chatId);
            else pinnedChats.splice(index, 1);
            localStorage.setItem('pinned_chats', JSON.stringify(pinnedChats));
            loadChatsList();
            document.getElementById('chatMenuModal').style.display = 'none';
        };
        
        document.getElementById('chatMenuDelete').onclick = async () => {
            if (!selectedChatForMenu) return;
            await fetch('/delete-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: selectedChatForMenu.chatId, full_nick: currentUser.full_nick })
            });
            document.getElementById('chatMenuModal').style.display = 'none';
            loadChatsList();
            if (currentChat.id === selectedChatForMenu.chatId) {
                closeChatView();
            }
        };
        
        document.getElementById('chatMenuClose').onclick = () => {
            document.getElementById('chatMenuModal').style.display = 'none';
        };
        
        document.getElementById('chatMenuModal').style.display = 'flex';
    }

    // --- Друзья ---
    async function loadFriends() {
        try {
            const [accepted, incoming, outgoing] = await Promise.all([
                fetch(`/friends?full_nick=${currentUser.full_nick}&filter=accepted`).then(r=>r.json()),
                fetch(`/friends?full_nick=${currentUser.full_nick}&filter=pending_incoming`).then(r=>r.json()),
                fetch(`/friends?full_nick=${currentUser.full_nick}&filter=pending_outgoing`).then(r=>r.json())
            ]);
            friendsData = { accepted, incoming, outgoing };
            renderFriendsList();
        } catch(e) { console.error(e); }
    }

    function renderFriendsList() {
        const container = document.getElementById('friendsListContainer');
        const query = friendsSearchQuery.toLowerCase();
        let list = [];
        if (friendsFilter === 'accepted') list = friendsData.accepted;
        else if (friendsFilter === 'incoming') list = friendsData.incoming;
        else list = friendsData.outgoing;
        
        list = list.filter(u => u.full_nick.toLowerCase().includes(query) || u.nick.toLowerCase().includes(query));
        let html = '';
        list.forEach(user => {
            const badge = getUserBadge(user.full_nick);
            html += `<div class="friend-item">
                <div class="friend-info"><span class="user-badge">${badge}</span><span class="friend-name">${escapeHtml(user.full_nick)}</span></div>
                <div class="friend-actions">`;
            if (friendsFilter === 'incoming') {
                html += `<button class="accept-friend" data-nick="${user.full_nick}">✓</button>
                         <button class="reject-friend" data-nick="${user.full_nick}">✕</button>`;
            } else if (friendsFilter === 'outgoing') {
                html += `<button class="cancel-request" data-nick="${user.full_nick}">✕</button>`;
            } else {
                html += `<button class="chat-with-friend" data-nick="${user.full_nick}">💬</button>`;
            }
            html += `</div></div>`;
        });
        container.innerHTML = html || '<div style="color:var(--text-secondary); text-align:center;">Пусто</div>';
        
        document.querySelectorAll('.accept-friend').forEach(b => b.onclick = () => respondFriend(b.dataset.nick, 'accept'));
        document.querySelectorAll('.reject-friend, .cancel-request').forEach(b => b.onclick = () => respondFriend(b.dataset.nick, 'reject'));
        document.querySelectorAll('.chat-with-friend').forEach(b => b.onclick = () => createPrivateChat(b.dataset.nick));
    }

    async function respondFriend(from, action) {
        if (action === 'accept') {
            await fetch('/friend-respond', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ full_nick: currentUser.full_nick, from, action: 'accept' })
            });
        } else {
            await fetch('/friend-respond', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ full_nick: currentUser.full_nick, from, action: 'reject' })
            });
        }
        loadFriends();
    }

    async function createPrivateChat(otherFullNick) {
        const res = await fetch('/create-private-chat', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ user1: currentUser.full_nick, user2: otherFullNick })
        });
        const data = await res.json();
        if (data.success) {
            const chat = { id: data.chatId, type: 'private', other: otherFullNick, name: otherFullNick };
            openChat(chat);
        }
    }

    // --- Поиск пользователей в чатах ---
    async function searchUsers(query) {
        if (!query) {
            document.getElementById('userSearchResults').innerHTML = '';
            document.getElementById('chatsListContainer').style.display = 'block';
            return;
        }
        document.getElementById('chatsListContainer').style.display = 'none';
        const res = await fetch(`/search-users?q=${encodeURIComponent(query)}&full_nick=${encodeURIComponent(currentUser.full_nick)}`);
        const users = await res.json();
        let html = '';
        users.forEach(u => {
            const badge = getUserBadge(u.full_nick);
            html += `<div class="friend-item">
                <div class="friend-info"><span class="user-badge">${badge}</span><span class="friend-name">${escapeHtml(u.full_nick)}</span></div>
                <div class="friend-actions">
                    <button class="add-friend-search" data-nick="${u.full_nick}">👤+</button>
                    <button class="write-search" data-nick="${u.full_nick}">💬</button>
                </div>
            </div>`;
        });
        document.getElementById('userSearchResults').innerHTML = html;
        document.querySelectorAll('.add-friend-search').forEach(b => b.onclick = () => sendFriendRequest(b.dataset.nick));
        document.querySelectorAll('.write-search').forEach(b => b.onclick = () => createPrivateChat(b.dataset.nick));
    }

    async function sendFriendRequest(to) {
        const res = await fetch('/friend-request', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ from: currentUser.full_nick, to })
        });
        const data = await res.json();
        alert(data.success ? 'Запрос отправлен' : (data.error || 'Ошибка'));
        loadFriends();
    }

    // --- Значки пользователей ---
    function getUserBadge(full_nick) {
        return full_nick === currentUser.full_nick ? (appSettings.userBadge || '') : '';
    }

    // --- Рендер сообщений ---
    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        const wasNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 200;
        container.innerHTML = '';
        const showReactions = appSettings.showReactions !== false;
        messages.forEach(msg => {
            const isOwn = msg.full_nick === currentUser.full_nick;
            const { nick, tag } = splitFullNick(msg.full_nick);
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-item' + (isOwn ? ' own-message' : '');
            msgDiv.dataset.id = msg.id;
            msgDiv.dataset.fullNick = msg.full_nick;
            let replyHtml = '';
            if (msg.reply_to_id && msg.reply_nick && msg.reply_text) {
                replyHtml = `<div class="reply-context" data-message="${msg.reply_to_id}"><div class="reply-nick">${escapeHtml(msg.reply_nick)}</div><div class="reply-text">${escapeHtml(msg.reply_text)}</div></div>`;
            }
            let reactionsHtml = '';
            if (showReactions && msg.reactions?.length) {
                reactionsHtml = '<div class="reactions-container">';
                msg.reactions.sort((a,b) => b.count - a.count).forEach(r => {
                    const userReacted = msg.user_reactions?.includes(r.reaction);
                    reactionsHtml += `<button class="reaction-badge ${userReacted ? 'user-reacted' : ''}" data-reaction="${r.reaction}" data-message="${msg.id}"><span>${r.reaction}</span> <span class="reaction-count">${r.count}</span></button>`;
                });
                reactionsHtml += '</div>';
            }
            const timestamp = formatTimestamp(msg.created_at, appSettings.showDate);
            const badge = getUserBadge(msg.full_nick);
            msgDiv.innerHTML = `
                <div class="message-header"><div class="message-nick"><span class="user-badge">${badge}</span><span class="nick-main">${escapeHtml(nick)}</span><span class="nick-tag">${escapeHtml(tag)}</span></div></div>
                ${replyHtml}
                <div class="message-text">${linkify(escapeHtml(msg.text))}</div>
                <div class="message-footer">
                    <div class="footer-left">
                        ${showReactions ? `<button class="reaction-btn" data-message="${msg.id}"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="#ff375f"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>` : ''}
                        ${reactionsHtml}
                    </div>
                    <div class="footer-right"><span class="timestamp">${timestamp}</span>${msg.edited?'<span class="edited-badge">изменено</span>':''}</div>
                </div>
                <div class="message-divider"></div>
            `;
            container.appendChild(msgDiv);
            const actionsBtn = document.createElement('button');
            actionsBtn.className = 'message-actions-btn';
            actionsBtn.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>';
            actionsBtn.onclick = (e) => { e.stopPropagation(); showContextMenu(msg.id, msg.full_nick, msg.text, isOwn); };
            msgDiv.appendChild(actionsBtn);
        });
        if (wasNearBottom && !window.isUserScrolling) container.scrollTop = container.scrollHeight;
        attachReactionEvents();
    }

    function attachReactionEvents() {
        if (appSettings.showReactions === false) return;
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentReactionMessage = parseInt(btn.dataset.message);
                showReactionPicker();
            });
        });
        document.querySelectorAll('.reaction-badge').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const reaction = btn.dataset.reaction;
                const messageId = parseInt(btn.dataset.message);
                addReaction(messageId, reaction);
            });
        });
        document.querySelectorAll('.reply-context').forEach(el => {
            el.addEventListener('click', () => scrollToMessage(parseInt(el.dataset.message)));
        });
        document.querySelectorAll('.message-nick').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const fullNick = el.closest('.message-item')?.dataset.fullNick;
                if (fullNick) navigator.clipboard?.writeText(fullNick);
            });
        });
    }

    async function addReaction(messageId, reaction) {
        const res = await fetch('/add-reaction', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messageId, full_nick: currentUser.full_nick, reaction, isRoom: false })
        });
        const data = await res.json();
        if (data.success) {
            const msg = messages.find(m => m.id === messageId);
            if (msg) {
                msg.reactions = data.reactions;
                if (!msg.user_reactions) msg.user_reactions = [];
                if (msg.user_reactions.includes(reaction))
                    msg.user_reactions = msg.user_reactions.filter(r => r !== reaction);
                else
                    msg.user_reactions.push(reaction);
                renderMessages();
            }
        }
    }

    function showReactionPicker() {
        const picker = document.getElementById('reactionsPicker');
        const reactionsList = ['❤️','🔥','👍','👎','👌','🖕','👀','😁','😭','😔','😩','😳','😠','😨','💩','👻','👽','👾','💋','💊'];
        picker.innerHTML = '';
        reactionsList.forEach(emoji => {
            const btn = document.createElement('button');
            btn.textContent = emoji;
            btn.onclick = () => {
                addReaction(currentReactionMessage, emoji);
                document.getElementById('reactionPickerModal').style.display = 'none';
            };
            picker.appendChild(btn);
        });
        document.getElementById('reactionPickerModal').style.display = 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text && !replyingTo && !editingMessage) return;
        if (!currentChat.id) return;

        if (editingMessage) {
            editMessage(editingMessage.id, text);
            editingMessage = null;
            input.value = '';
            autoResizeTextarea(input);
            hideEditIndicator();
            return;
        }

        const payload = {
            chat_id: currentChat.id,
            full_nick: currentUser.full_nick,
            text,
            reply_to_id: replyingTo?.messageId || null
        };

        fetch('/chat-message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        replyingTo = null;
        hideReplyIndicator();
        input.value = '';
        autoResizeTextarea(input);
        onTyping(false);
        input.focus();
    }

    async function editMessage(messageId, newText) {
        const res = await fetch('/edit-message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messageId, full_nick: currentUser.full_nick, newText })
        });
        const data = await res.json();
        if (!data.success) alert('Не удалось отредактировать');
    }

    function showContextMenu(messageId, full_nick, text, isOwn) {
        const showReactions = appSettings.showReactions !== false;
        const { nick, tag } = splitFullNick(full_nick);
        document.getElementById('contextMessageNick').innerHTML = `${escapeHtml(nick)}<span class="nick-tag">${escapeHtml(tag)}</span>`;
        document.getElementById('contextMessagePreview').innerHTML = linkify(escapeHtml(text.substring(0, 150))) + (text.length>150?'…':'');
        const container = document.getElementById('contextMenuButtons');
        let html = '';
        if (showReactions) html += `<button id="ctx-react"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="#ff375f"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> Реакция</button>`;
        html += `<button id="ctx-reply"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 10h10a8 8 0 0 1 8 8v2M3 10l6 6M3 10l6-6"/></svg> Ответить</button>`;
        if (isOwn) html += `<button id="ctx-edit"><svg viewBox="0 0 24 24"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg> Редактировать</button>`;
        html += `<button id="ctx-copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Скопировать</button>`;
        if (isOwn) html += `<button id="ctx-delete"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Удалить</button>`;
        html += `<button id="ctx-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Закрыть</button>`;
        container.innerHTML = html;

        const modal = document.getElementById('contextMenuModal');
        if (showReactions) document.getElementById('ctx-react').onclick = () => {
            currentReactionMessage = messageId;
            showReactionPicker();
            modal.style.display = 'none';
        };
        document.getElementById('ctx-reply').onclick = () => {
            if (editingMessage) { editingMessage = null; hideEditIndicator(); }
            replyingTo = { messageId, full_nick, text };
            showReplyIndicator(replyingTo);
            modal.style.display = 'none';
            document.getElementById('messageInput').focus();
        };
        document.getElementById('ctx-copy').onclick = () => {
            navigator.clipboard.writeText(text);
            modal.style.display = 'none';
        };
        if (isOwn) {
            document.getElementById('ctx-edit').onclick = () => {
                if (replyingTo) { replyingTo = null; hideReplyIndicator(); }
                editingMessage = { id: messageId, text };
                showEditIndicator(editingMessage);
                const inp = document.getElementById('messageInput');
                inp.value = text;
                inp.focus();
                modal.style.display = 'none';
            };
            document.getElementById('ctx-delete').onclick = () => {
                pendingDeleteMessageId = messageId;
                document.getElementById('confirmMessage').innerText = 'Удалить сообщение?';
                pendingAction = 'delete_message';
                document.getElementById('confirmModal').style.display = 'flex';
                modal.style.display = 'none';
            };
        }
        document.getElementById('ctx-close').onclick = () => modal.style.display = 'none';
        modal.style.display = 'flex';
    }

    function showReplyIndicator(reply) {
        let ind = document.getElementById('replyIndicator');
        if (!ind) {
            ind = document.createElement('div');
            ind.id = 'replyIndicator';
            ind.className = 'reply-indicator';
            ind.innerHTML = `<div class="reply-content"><div class="reply-nick"></div><div class="reply-text"></div></div><button class="cancel-reply">✕</button>`;
            document.querySelector('.input-wrapper').before(ind);
            ind.querySelector('.cancel-reply').onclick = () => {
                replyingTo = null;
                ind.style.display = 'none';
            };
        }
        ind.querySelector('.reply-nick').innerHTML = escapeHtml(reply.full_nick);
        ind.querySelector('.reply-text').innerHTML = escapeHtml(reply.text);
        ind.style.display = 'flex';
    }

    function hideReplyIndicator() {
        const ind = document.getElementById('replyIndicator');
        if (ind) ind.style.display = 'none';
    }

    function showEditIndicator(edit) {
        let ind = document.getElementById('editIndicator');
        if (!ind) {
            ind = document.createElement('div');
            ind.id = 'editIndicator';
            ind.className = 'edit-indicator';
            ind.innerHTML = `<div class="edit-content"><div class="edit-label">Редактирование</div><div class="edit-text"></div></div><button class="cancel-edit">✕</button>`;
            document.querySelector('.input-wrapper').before(ind);
            ind.querySelector('.cancel-edit').onclick = () => {
                editingMessage = null;
                ind.style.display = 'none';
                document.getElementById('messageInput').value = '';
            };
        }
        ind.querySelector('.edit-text').innerHTML = escapeHtml(edit.text);
        ind.style.display = 'flex';
    }

    function hideEditIndicator() {
        const ind = document.getElementById('editIndicator');
        if (ind) ind.style.display = 'none';
    }

    function updateTypingIndicator(data) {
        const ind = document.getElementById('typingIndicator');
        if (!ind) return;
        if (!data || data.full_nick === currentUser.full_nick) {
            ind.classList.add('hidden');
            return;
        }
        const { nick, tag } = splitFullNick(data.full_nick);
        ind.innerHTML = `${escapeHtml(nick)}${escapeHtml(tag)} печатает...`;
        ind.classList.remove('hidden');
        clearTimeout(window.typingHideTimeout);
        window.typingHideTimeout = setTimeout(() => ind.classList.add('hidden'), 2000);
    }

    function onTyping(isTyping) {
        if (!socket || !currentChat.id) return;
        if (isTyping) {
            socket.emit('typing', { chatId: currentChat.id, full_nick: currentUser.full_nick });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => socket.emit('stop typing', { chatId: currentChat.id }), 1500);
        } else {
            clearTimeout(typingTimeout);
            socket.emit('stop typing', { chatId: currentChat.id });
        }
    }

    function scrollToMessage(messageId) {
        const el = document.querySelector(`.message-item[data-id="${messageId}"] .message-text`);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight');
            setTimeout(() => el.classList.remove('highlight'), 2000);
        }
    }

    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }

    // --- Инициализация сокетов и событий ---
    async function initializeApp() {
        document.getElementById('showDateToggle').checked = appSettings.showDate;
        document.getElementById('showReactionsToggle').checked = appSettings.showReactions;
        document.getElementById('notificationsToggle').checked = appSettings.notifications;
        document.getElementById('badgeSelect').value = appSettings.userBadge;
        document.getElementById('accentColorSelect').value = appSettings.accentColor;

        document.getElementById('showDateToggle').onchange = e => {
            appSettings.showDate = e.target.checked;
            localStorage.setItem('simply_settings', JSON.stringify(appSettings));
            renderMessages();
            renderChatsList();
        };
        document.getElementById('showReactionsToggle').onchange = e => {
            appSettings.showReactions = e.target.checked;
            localStorage.setItem('simply_settings', JSON.stringify(appSettings));
            renderMessages();
        };
        document.getElementById('notificationsToggle').onchange = e => {
            appSettings.notifications = e.target.checked;
            localStorage.setItem('simply_settings', JSON.stringify(appSettings));
        };
        document.getElementById('badgeSelect').onchange = e => {
            appSettings.userBadge = e.target.value;
            localStorage.setItem('simply_settings', JSON.stringify(appSettings));
            renderMessages();
            renderFriendsList();
        };
        document.getElementById('accentColorSelect').onchange = e => {
            appSettings.accentColor = e.target.value;
            localStorage.setItem('simply_settings', JSON.stringify(appSettings));
            document.documentElement.style.setProperty('--accent-color', e.target.value);
        };

        await loadChatsList();
        await loadFriends();

        socket.on('chat message received', (newMsg) => {
            if (currentChat.id === newMsg.chat_id) {
                messages.push(newMsg);
                renderMessages();
            }
            loadChatsList();
        });

        socket.on('message deleted', (msgId) => {
            messages = messages.filter(m => m.id !== msgId);
            renderMessages();
            loadChatsList();
        });

        socket.on('message edited', ({ messageId, newText }) => {
            const msg = messages.find(m => m.id === messageId);
            if (msg) { msg.text = newText; msg.edited = true; renderMessages(); }
            loadChatsList();
        });

        socket.on('reaction updated', ({ messageId, reactions }) => {
            const msg = messages.find(m => m.id === messageId);
            if (msg) { msg.reactions = reactions; renderMessages(); }
        });

        socket.on('user typing', (data) => {
            if (data.chatId === currentChat.id) updateTypingIndicator(data);
        });

        socket.on('user stop typing', (data) => {
            if (data.chatId === currentChat.id) updateTypingIndicator(null);
        });

        socket.on('online status', ({ full_nick, online }) => {
            if (online) onlineUsers.add(full_nick);
            else onlineUsers.delete(full_nick);
            if (currentChat.type === 'private' && currentChat.other === full_nick)
                updateChatStatus(full_nick);
        });

        socket.on('nick changed', ({ oldFullNick, newFullNick }) => {
            if (currentUser.full_nick === oldFullNick) {
                currentUser.full_nick = newFullNick;
                document.getElementById('profileNickDisplay').innerText = newFullNick;
            }
            loadFriends();
            loadChatsList();
        });

        refreshInterval = setInterval(() => {
            if (currentChat.id) {
                loadChatMessages().then(renderMessages);
            } else {
                loadChatsList();
            }
            if (document.getElementById('friendsPanel').style.display === 'flex') {
                loadFriends();
            }
            if (currentChat.type === 'private' && currentChat.other) {
                updateChatStatus(currentChat.other);
            }
        }, 1000);
    }

    // --- Настройка модалок ---
    function setupProfileModals() {
        document.getElementById('openSelfExpressionBtn').onclick = () => {
            document.getElementById('selfExpressionModal').style.display = 'flex';
        };
        document.getElementById('closeSelfExpressionBtn').onclick = () => {
            document.getElementById('selfExpressionModal').style.display = 'none';
        };
        document.getElementById('openChangeNickModalBtn').onclick = () => {
            document.getElementById('changeNickModal').style.display = 'flex';
            document.getElementById('newNickInput').value = '';
        };
        document.getElementById('cancelNickChangeBtn').onclick = () => {
            document.getElementById('changeNickModal').style.display = 'none';
        };
        document.getElementById('applyNickChangeBtn').onclick = async () => {
            const newNick = document.getElementById('newNickInput').value.trim();
            if (!newNick) return;
            const res = await fetch('/change-nick', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: authToken, newNick })
            });
            const data = await res.json();
            if (data.success) {
                currentUser.full_nick = data.newFullNick;
                document.getElementById('profileNickDisplay').innerText = data.newFullNick;
                document.getElementById('changeNickModal').style.display = 'none';
                alert('Ник изменён');
            } else alert(data.error);
        };

        document.getElementById('openNotifSettingsBtn').onclick = () => {
            document.getElementById('notifSettingsModal').style.display = 'flex';
        };
        document.getElementById('closeNotifSettingsBtn').onclick = () => {
            document.getElementById('notifSettingsModal').style.display = 'none';
        };

        document.getElementById('openPrivacySettingsBtn').onclick = () => {
            document.getElementById('privacySettingsModal').style.display = 'flex';
        };
        document.getElementById('closePrivacySettingsBtn').onclick = () => {
            document.getElementById('privacySettingsModal').style.display = 'none';
        };
        document.getElementById('changePinFromPrivacyBtn').onclick = () => {
            document.getElementById('changePinModal').style.display = 'flex';
        };
        document.getElementById('logoutBtn').onclick = () => {
            pendingAction = 'logout';
            document.getElementById('confirmMessage').innerText = 'Выйти из аккаунта?';
            document.getElementById('confirmModal').style.display = 'flex';
        };
        document.getElementById('deleteAccountBtn').onclick = () => {
            pendingAction = 'delete_account';
            document.getElementById('pinConfirmModal').style.display = 'flex';
            document.getElementById('pinConfirmInput').value = '';
        };

        document.getElementById('openStyleSettingsBtn').onclick = () => {
            document.getElementById('styleSettingsModal').style.display = 'flex';
        };
        document.getElementById('closeStyleSettingsBtn').onclick = () => {
            document.getElementById('styleSettingsModal').style.display = 'none';
        };

        document.getElementById('applyPinBtn').onclick = async () => {
            const old = document.getElementById('oldPinInput').value;
            const newP = document.getElementById('newPinInput').value;
            if (!old || !newP || newP.length!==4 || !/^\d+$/.test(newP)) {
                alert('PIN должен быть 4 цифры');
                return;
            }
            const res = await fetch('/change-pin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: authToken, oldPin: old, newPin: newP })
            });
            const data = await res.json();
            if (data.success) {
                alert('PIN изменён');
                document.getElementById('changePinModal').style.display = 'none';
            } else alert(data.error);
        };
        document.getElementById('cancelPinBtn').onclick = () => {
            document.getElementById('changePinModal').style.display = 'none';
        };
    }

    // Подтверждения
    document.getElementById('confirmOkBtn').onclick = async () => {
        const modal = document.getElementById('confirmModal');
        modal.style.display = 'none';
        if (pendingAction === 'delete_message' && pendingDeleteMessageId) {
            await fetch('/delete-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messageId: pendingDeleteMessageId, full_nick: currentUser.full_nick })
            });
            pendingDeleteMessageId = null;
        } else if (pendingAction === 'logout') {
            localStorage.removeItem('simply_token');
            location.reload();
        }
        pendingAction = null;
    };
    document.getElementById('confirmCancelBtn').onclick = () => {
        document.getElementById('confirmModal').style.display = 'none';
        pendingAction = null;
    };

    document.getElementById('pinConfirmOkBtn').onclick = async () => {
        const pin = document.getElementById('pinConfirmInput').value;
        if (!pin) return;
        const res = await fetch('/delete-account', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: authToken, pin })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.removeItem('simply_token');
            location.reload();
        } else {
            alert(data.error || 'Ошибка');
        }
        document.getElementById('pinConfirmModal').style.display = 'none';
    };
    document.getElementById('pinConfirmCancelBtn').onclick = () => {
        document.getElementById('pinConfirmModal').style.display = 'none';
    };

    document.getElementById('closeReactionPickerBtn').onclick = () => {
        document.getElementById('reactionPickerModal').style.display = 'none';
    };

    // --- Привязка UI ---
    function bindUI() {
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => showTab(btn.dataset.tab);
        });

        document.querySelectorAll('.segment-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                friendsFilter = btn.dataset.filter;
                renderFriendsList();
            };
        });

        document.getElementById('friendsSearchInput').oninput = (e) => {
            friendsSearchQuery = e.target.value;
            renderFriendsList();
        };

        document.getElementById('chatSearchInput').oninput = (e) => {
            chatSearchQuery = e.target.value;
            renderChatsList();
            searchUsers(e.target.value);
        };

        document.getElementById('addFriendBtn').onclick = () => {
            document.getElementById('addFriendModal').style.display = 'flex';
            document.getElementById('friendFullNickInput').value = '';
        };
        document.getElementById('cancelAddFriendBtn').onclick = () => {
            document.getElementById('addFriendModal').style.display = 'none';
        };
        document.getElementById('sendFriendRequestBtn').onclick = async () => {
            const to = document.getElementById('friendFullNickInput').value.trim();
            if (!to) return;
            await sendFriendRequest(to);
            document.getElementById('addFriendModal').style.display = 'none';
        };

        document.getElementById('backFromChatBtn').onclick = closeChatView;

        document.getElementById('sendBtn').onclick = sendMessage;
        const msgInput = document.getElementById('messageInput');
        msgInput.addEventListener('input', () => {
            autoResizeTextarea(msgInput);
            onTyping(true);
        });

        window.isUserScrolling = false;
        document.getElementById('messagesContainer')?.addEventListener('scroll', () => {
            window.isUserScrolling = true;
            clearTimeout(window.scrollTimeout);
            window.scrollTimeout = setTimeout(() => window.isUserScrolling = false, 200);
        });
    }

    // --- Запуск ---
    const token = localStorage.getItem('simply_token');
    if (token) {
        fetch('/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        }).then(r => r.json()).then(async data => {
            if (data.success) {
                currentUser.full_nick = data.full_nick;
                authToken = token;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                socket = io();
                socket.emit('user online', currentUser.full_nick);
                await setOneSignalUserId(currentUser.full_nick);
                bindUI();
                setupProfileModals();
                await initializeApp();
                showTab('chats');
            } else {
                localStorage.removeItem('simply_token');
                document.getElementById('loginScreen').style.display = 'flex';
            }
        });
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
    }

    document.getElementById('loginBtn').onclick = async () => {
        const nick = document.getElementById('loginNick').value.trim();
        const pin = document.getElementById('loginPin').value;
        if (!nick || !pin || pin.length !== 4 || !/^\d+$/.test(pin)) {
            document.getElementById('loginError').innerText = 'Введите ник и 4-значный PIN';
            return;
        }
        const res = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nick, pin })
        });
        const data = await res.json();
        if (data.success) {
            currentUser.full_nick = data.full_nick;
            authToken = data.token;
            localStorage.setItem('simply_token', authToken);
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            socket = io();
            socket.emit('user online', currentUser.full_nick);
            await setOneSignalUserId(currentUser.full_nick);
            bindUI();
            setupProfileModals();
            await initializeApp();
            showTab('chats');
        } else {
            document.getElementById('loginError').innerText = data.error || 'Ошибка входа';
        }
    };
</script>
</body>
