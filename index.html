<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1c1c1e" id="themeColorMeta">
    <title>ChatX</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Отключаем системное контекстное меню и выделение на iOS -->
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "22366383-4ee8-4a91-b727-1c11e6bdc218",
        });
        const permission = await OneSignal.Notifications.permission;
        if (permission === 'default') {
          await OneSignal.Slidedown.promptPush();
        }
      });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-touch-callout: none;
        }
        html {
            font-size: 1.1rem; /* увеличение на 10% */
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: fixed;
            width: 100%;
        }
        :root {
            --bg-page: #121212;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --border-light: rgba(84,84,88,0.4);
            --accent-color: #0a84ff;
            --input-bg: #1c1c1e;
            --accent-rgb: 10, 132, 255;
        }
        button, .clickable {
            cursor: pointer;
            transition: all 0.05s ease;
        }
        button:active, .clickable:active {
            opacity: 0.6;
            transform: scale(0.97);
        }

        .login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-page); display: flex; align-items: flex-start; justify-content: center;
            padding-top: 25vh; z-index:2000; overflow: hidden;
        }
        .login-card {
            background: var(--input-bg); border-radius: 2rem; padding: 2rem; width:90%; max-width:350px;
            border:1px solid var(--border-light); box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }
        .login-card h2 { margin-bottom:1.5rem; text-align:center; font-weight:590; font-size:1.8rem; }
        .login-card input {
            width:100%; padding:0.9rem; margin-bottom:1rem; background: var(--bg-page);
            border:1px solid var(--border-light); border-radius:1rem; color:var(--text-primary); font-size:1rem; outline:none;
        }
        .login-card input:focus { border-color:var(--accent-color); }
        .login-card button {
            width:100%; padding:0.9rem; background:var(--accent-color); border:none;
            border-radius:1rem; color:white; font-weight:600; font-size:1rem;
        }
        .login-card .error { color:#ff6b6b; font-size:0.8rem; margin-top:0.5rem; text-align:center; }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-page);
            position: relative;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message-item {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
            background: transparent;
        }
        .message-text.highlight {
            color: var(--accent-color);
            transition: color 0.2s;
        }
        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }
        .message-nick {
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: baseline;
            gap: 0;
            cursor: pointer;
        }
        .nick-main { color: var(--text-secondary); }
        .own-message .nick-main { color: var(--accent-color); }
        .nick-tag { color:#6c6c70; font-weight:400; font-size:0.8rem; }
        .message-actions-btn {
            position: absolute; right: 0; top: 0;
            background: none; border: none;
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 16px;
            color: var(--text-secondary);
        }
        .message-actions-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
        .reply-context {
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 2px solid var(--accent-color);
            cursor: pointer;
        }
        .reply-context .reply-nick {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 600;
        }
        .reply-context .reply-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message-text { 
            font-size:1rem; line-height:1.4; color:var(--text-primary); 
            white-space:pre-wrap; word-break:break-word; 
        }
        .message-text a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .message-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .footer-right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .reaction-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2rem;
            background: var(--input-bg);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .reaction-btn svg {
            width: 1.1rem;
            height: 1.1rem;
            fill: #ff375f;
            stroke: #ff375f;
        }
        .reactions-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-left: 0;
        }
        .reaction-badge {
            background: var(--input-bg);
            border-radius: 2rem;
            padding: 4px 10px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border: 0.5px solid var(--border-light);
        }
        .reaction-badge .reaction-count {
            color: var(--text-secondary);
        }
        .reaction-badge.user-reacted .reaction-count {
            color: var(--accent-color);
        }
        .edited-badge {
            font-size:0.75rem;
            color:var(--text-secondary);
            font-style:italic;
        }
        .message-divider {
            margin-top: 10px;
            height: 1px;
            background-color: var(--border-light);
            width: 100%;
        }

        .typing-indicator {
            background: var(--input-bg);
            border-top: 1px solid var(--border-light);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .typing-indicator.hidden {
            display: none;
        }

        .input-wrapper {
            background: var(--input-bg);
            border-top: 1px solid var(--border-light);
            padding-bottom: env(safe-area-inset-bottom,0);
        }
        .input-row {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 1rem 1rem;
        }
        .settings-icon {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            padding: 0;
            width: 2.2rem;
            height: 2.2rem;
            flex-shrink: 0;
        }
        .settings-icon svg {
            width: 1.5rem;
            height: 1.5rem;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }
        .input-row textarea {
            flex:1; background:transparent; border:none; padding:0.8rem 0; font-size:1rem;
            color:var(--text-primary); outline:none; resize: none; 
            font-family:inherit; line-height:1.4; max-height:150px; overflow-y: auto;
        }
        .send-btn {
            background:var(--accent-color); border:none; width:2.8rem; height:2.8rem; border-radius:2rem;
            color:white; font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .reply-indicator, .edit-indicator {
            margin: 0.5rem 1rem 0;
            background: var(--input-bg);
            border-left: 2px solid var(--accent-color);
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0.5rem 0.8rem;
            position: relative;
        }
        .reply-indicator::before, .edit-indicator::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--border-light);
        }
        .reply-indicator .reply-content, .edit-indicator .edit-content {
            flex: 1;
            overflow: hidden;
        }
        .reply-indicator .reply-nick, .edit-indicator .edit-label {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 600;
        }
        .reply-indicator .reply-text, .edit-indicator .edit-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cancel-reply, .cancel-edit {
            background: var(--bg-page);
            border: none;
            border-radius: 1rem;
            width: 2.2rem;
            height: 2.2rem;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
        }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background-color:rgba(0,0,0,0.7); backdrop-filter:blur(12px); z-index:10000;
            justify-content:center; align-items:center;
        }
        .modal-content {
            background:var(--input-bg); border-radius:2rem; padding:1.8rem; width:90%; max-width:380px;
            border:0.5px solid var(--border-light); box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }
        .modal-content h3 { margin-bottom:1.2rem; font-size:1.4rem; font-weight:590; color:var(--text-primary); }
        .modal-setting { margin-bottom:1.2rem; }
        .modal-setting label { display:block; margin-bottom:0.5rem; font-weight:500; font-size:0.9rem; color:var(--text-secondary); }
        .modal-setting input {
            width:100%; padding:0.7rem 1rem; background:var(--bg-page); border:0.5px solid var(--border-light);
            border-radius:1rem; font-size:1rem; color:var(--text-primary); outline:none;
        }
        .modal-buttons { display:flex; gap:12px; margin-top:1.5rem; }
        .modal-buttons button {
            flex:1; padding:0.8rem; border-radius:1rem; font-weight:590; cursor:pointer; border:1px solid var(--border-light);
            font-size:0.9rem; background: var(--bg-page); color: var(--text-primary);
        }
        .modal-buttons button:last-child { background: var(--bg-page); color: var(--text-primary); border:1px solid var(--border-light); }

        .context-menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .context-menu-buttons button {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            font-size: 1rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }
        .context-menu-buttons button:active {
            background: rgba(128,128,128,0.2);
        }
        .context-menu-buttons svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }
        .context-message-nick {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .context-message-preview {
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 0.5rem 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .reactions-picker {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.6rem;
            justify-items: center;
            margin-bottom: 1.2rem;
        }
        .reactions-picker button {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 1rem;
        }

        .settings-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 0.9rem;
        }
        .setting-row:last-of-type {
            border-bottom: none;
        }
        .setting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-label {
            font-size: 1rem;
            color: var(--text-primary);
        }
        .setting-value {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .nick-readonly {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            width: 100%;
            text-align: left;
        }
        .setting-row button {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.6rem 1.2rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2c2c2e;
            transition: 0.2s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--accent-color);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h2>ChatX</h2>
        <input type="text" id="loginNick" placeholder="Ник" autocomplete="off">
        <input type="text" id="loginPin" placeholder="PIN (4 цифры)" maxlength="4" inputmode="numeric" pattern="\d*" autocomplete="off">
        <button id="loginBtn">Войти</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="appContainer" class="app-container" style="display: none;">
    <div class="chat-messages" id="messagesContainer"></div>
    <div class="typing-indicator hidden" id="typingIndicator"></div>
    <div class="input-wrapper">
        <div class="input-row">
            <button class="settings-icon" id="openSettingsBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="3" stroke="currentColor" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04Z" />
                    <path d="M16.5 9.4a10 10 0 0 0-9-5.4 10 10 0 0 0-9 5.4" />
                </svg>
            </button>
            <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">↑</button>
        </div>
    </div>
</div>

<!-- Модальные окна -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Настройки</h3>
        <div class="settings-container">
            <div class="setting-row">
                <div class="setting-header">
                    <span class="setting-label">Ваш ник</span>
                    <button id="changeNickBtn">Изменить</button>
                </div>
                <div class="setting-value">
                    <div id="displayNickWithTag" class="nick-readonly"></div>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-header">
                    <span class="setting-label">PIN</span>
                    <button id="changePinBtn">Сменить</button>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-header">
                    <span class="setting-label">Показать дату</span>
                    <label class="switch">
                        <input type="checkbox" id="showDateToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-header">
                    <span class="setting-label">Реакции</span>
                    <label class="switch">
                        <input type="checkbox" id="showReactionsToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-header">
                    <span class="setting-label">Уведомления</span>
                    <label class="switch">
                        <input type="checkbox" id="notificationsToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
        <div class="modal-buttons" style="margin-top: 1.5rem;">
            <button id="closeSettingsBtn">Закрыть</button>
        </div>
    </div>
</div>

<div id="changeNickModal" class="modal"><div class="modal-content"><h3>Смена ника</h3><div class="modal-setting"><label>Новый ник</label><input type="text" id="newNickInput" placeholder="Новый ник"></div><div class="modal-buttons"><button id="cancelNickBtn">Закрыть</button><button id="applyNickBtn">Применить</button></div></div></div>
<div id="changePinModal" class="modal"><div class="modal-content"><h3>Смена PIN</h3><div class="modal-setting"><label>Старый PIN</label><input type="password" id="oldPinInput" placeholder="Старый PIN" maxlength="4" inputmode="numeric"></div><div class="modal-setting"><label>Новый PIN</label><input type="password" id="newPinInput" placeholder="Новый PIN" maxlength="4" inputmode="numeric"></div><div class="modal-buttons"><button id="cancelPinBtn">Закрыть</button><button id="applyPinBtn">Применить</button></div></div></div>
<div id="contextMenuModal" class="modal context-menu-modal"><div class="modal-content"><div id="contextMessageNick" class="context-message-nick"></div><div id="contextMessagePreview" class="context-message-preview"></div><div class="context-menu-buttons" id="contextMenuButtons"></div></div></div>
<div id="confirmModal" class="modal"><div class="modal-content"><h3>Подтверждение</h3><p id="confirmMessage" style="margin-bottom:1rem;">Вы уверены?</p><div class="modal-buttons"><button id="confirmCancelBtn">Отмена</button><button id="confirmOkBtn">Удалить</button></div></div></div>
<div id="reactionPickerModal" class="modal"><div class="modal-content"><h3>Выберите реакцию</h3><div class="reactions-picker" id="reactionsPicker"></div><div class="modal-buttons"><button id="closeReactionPickerBtn">Закрыть</button></div></div></div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    let socket = null;
    let currentUser = { full_nick: "" };
    let authToken = localStorage.getItem('simply_token');
    let appSettings = JSON.parse(localStorage.getItem('simply_settings')) || { 
        showDate: true, 
        showReactions: true,
        notifications: true
    };
    
    let messages = [];
    let editingMessage = null;
    let pendingDeleteMessageId = null;
    let currentReactionMessage = null;
    let replyingTo = null;
    let typingTimeout = null;
    let refreshInterval = null;

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function splitFullNick(full) { const h=full.lastIndexOf('#'); if(h===-1) return {nick:full,tag:''}; return {nick:full.slice(0,h),tag:full.slice(h)}; }
    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color: var(--accent-color); text-decoration: underline;">${url}</a>`);
    }
    function formatTimestamp(isoString, showDate) {
        const date = new Date(isoString);
        const hours = String(date.getHours()).padStart(2,'0');
        const minutes = String(date.getMinutes()).padStart(2,'0');
        if (showDate) {
            const day = String(date.getDate()).padStart(2,'0');
            const month = String(date.getMonth()+1).padStart(2,'0');
            const year = date.getFullYear();
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        } else {
            return `${hours}:${minutes}`;
        }
    }

    function setOneSignalUserId(userId) {
        if (window.OneSignalDeferred) {
            OneSignalDeferred.push(async function(OneSignal) {
                await OneSignal.login(userId);
                console.log('OneSignal external_user_id установлен:', userId);
            });
        }
    }

    async function loadMessages() {
        try {
            const res = await fetch(`/messages?full_nick=${encodeURIComponent(currentUser.full_nick)}`);
            const data = await res.json();
            messages = data;
            renderMessages();
        } catch(e) { console.error(e); }
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        const wasNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 200;
        container.innerHTML = '';
        const showReactions = appSettings.showReactions !== false;
        messages.forEach(msg => {
            const isOwn = currentUser && msg.full_nick === currentUser.full_nick;
            const { nick, tag } = splitFullNick(msg.full_nick);
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-item';
            if (isOwn) msgDiv.classList.add('own-message');
            msgDiv.setAttribute('data-id', msg.id);
            msgDiv.setAttribute('data-full-nick', msg.full_nick);
            let replyHtml = '';
            if (msg.reply_to_id && msg.reply_nick && msg.reply_text) {
                replyHtml = `
                    <div class="reply-context" data-message="${msg.reply_to_id}">
                        <div class="reply-nick">${escapeHtml(msg.reply_nick)}</div>
                        <div class="reply-text">${escapeHtml(msg.reply_text)}</div>
                    </div>
                `;
            }
            let reactionsHtml = '';
            if (showReactions && msg.reactions && msg.reactions.length) {
                const sorted = [...msg.reactions].sort((a,b) => b.count - a.count);
                reactionsHtml = '<div class="reactions-container">';
                sorted.forEach(r => {
                    const userReacted = msg.user_reactions && msg.user_reactions.includes(r.reaction);
                    reactionsHtml += `<button class="reaction-badge ${userReacted ? 'user-reacted' : ''}" data-reaction="${r.reaction}" data-message="${msg.id}"><span>${r.reaction}</span> <span class="reaction-count">${r.count}</span></button>`;
                });
                reactionsHtml += '</div>';
            }
            const timestamp = formatTimestamp(msg.created_at, appSettings.showDate);
            msgDiv.innerHTML = `
                <div class="message-header">
                    <div class="message-nick">
                        <span class="nick-main">${escapeHtml(nick)}</span><span class="nick-tag">${escapeHtml(tag)}</span>
                    </div>
                </div>
                ${replyHtml}
                <div class="message-text">${linkify(escapeHtml(msg.text))}</div>
                <div class="message-footer">
                    <div class="footer-left">
                        ${showReactions ? `<button class="reaction-btn" data-message="${msg.id}"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="#ff375f"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>` : ''}
                        ${reactionsHtml}
                    </div>
                    <div class="footer-right">
                        <span class="timestamp">${timestamp}</span>
                        ${msg.edited ? '<span class="edited-badge">изменено</span>' : ''}
                    </div>
                </div>
                <div class="message-divider"></div>
            `;
            container.appendChild(msgDiv);
            const actionsBtn = document.createElement('button');
            actionsBtn.className = 'message-actions-btn';
            actionsBtn.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>';
            actionsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showContextMenu(msg.id, msg.full_nick, msg.text, isOwn);
            });
            msgDiv.appendChild(actionsBtn);
        });
        attachReactionEvents();
        if (wasNearBottom && !window.isUserScrolling) container.scrollTop = container.scrollHeight;
    }

    function attachReactionEvents() {
        const showReactions = appSettings.showReactions !== false;
        if (showReactions) {
            document.querySelectorAll('.reaction-btn').forEach(btn => btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const messageId = parseInt(btn.dataset.message);
                currentReactionMessage = messageId;
                showReactionPicker();
            }));
            document.querySelectorAll('.reaction-badge').forEach(btn => btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const reaction = btn.dataset.reaction;
                const messageId = parseInt(btn.dataset.message);
                addReaction(messageId, reaction);
            }));
        }
        document.querySelectorAll('.reply-context').forEach(el => {
            el.addEventListener('click', () => {
                const targetId = parseInt(el.dataset.message);
                scrollToMessage(targetId);
            });
        });
        document.querySelectorAll('.message-nick').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const fullNick = el.closest('.message-item').dataset.fullNick;
                if (fullNick) navigator.clipboard.writeText(fullNick);
            });
        });
    }

    async function addReaction(messageId, reaction) {
        try {
            const res = await fetch('/add-reaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messageId, full_nick: currentUser.full_nick, reaction, isRoom: false })
            });
            const data = await res.json();
            if (data.success) {
                const msg = messages.find(m => m.id === messageId);
                if (msg) {
                    msg.reactions = data.reactions;
                    if (!msg.user_reactions) msg.user_reactions = [];
                    if (msg.user_reactions.includes(reaction)) msg.user_reactions = msg.user_reactions.filter(r => r !== reaction);
                    else msg.user_reactions.push(reaction);
                    renderMessages();
                }
            }
        } catch(e) { console.error(e); }
    }

    function showReactionPicker() {
        const pickerDiv = document.getElementById('reactionsPicker');
        const reactionsList = ['❤️','🔥','👍','👎','👌','🖕','👀','😁','😭','😔','😩','😳','😠','😨','💩','👻','👽','👾','💋','💊'];
        pickerDiv.innerHTML = '';
        reactionsList.forEach(emoji => {
            const btn = document.createElement('button');
            btn.textContent = emoji;
            btn.onclick = () => {
                addReaction(currentReactionMessage, emoji);
                document.getElementById('reactionPickerModal').style.display = 'none';
            };
            pickerDiv.appendChild(btn);
        });
        document.getElementById('reactionPickerModal').style.display = 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        let text = input.value.trim();
        if (!text && !replyingTo && !editingMessage) return;
        if (editingMessage) {
            editMessage(editingMessage.id, text);
            editingMessage = null;
            input.value = '';
            autoResizeTextarea(input);
            hideEditIndicator();
            return;
        }
        if (replyingTo) {
            const payload = { full_nick: currentUser.full_nick, text, reply_to_id: replyingTo.messageId };
            socket.emit('new message', payload);
            replyingTo = null;
            hideReplyIndicator();
            input.value = '';
            autoResizeTextarea(input);
            input.focus();
            return;
        }
        const payload = { full_nick: currentUser.full_nick, text };
        socket.emit('new message', payload);
        input.value = '';
        autoResizeTextarea(input);
        input.focus();
        onTyping(false);
    }

        const res = await fetch('/edit-message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messageId, full_nick: currentUser.full_nick, newText })
        });

    function updateTypingIndicator(full_nick) {
        const indicator = document.getElementById('typingIndicator');
        if (!indicator) return;
        if (!full_nick) {
            indicator.classList.add('hidden');
            return;
        }
        const { nick, tag } = splitFullNick(full_nick);
        indicator.innerHTML = `${escapeHtml(nick)}${escapeHtml(tag)} печатает...`;

        setTimeout(() => {
            if (indicator.innerHTML.includes('печатает')) indicator.classList.add('hidden');
        }, 2000);

    function onTyping(isTyping) {
        if (!socket) return;
        if (isTyping) {
            socket.emit('typing', { roomId: 'public', full_nick: currentUser.full_nick });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop typing', { roomId: 'public', full_nick: currentUser.full_nick });
            }, 1500);
        } else {
            if (typingTimeout) clearTimeout(typingTimeout);
            socket.emit('stop typing', { roomId: 'public', full_nick: currentUser.full_nick });
        }
    }

        const element = document.querySelector(`.message-item[data-id="${messageId}"] .message-text`);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            element.classList.add('highlight');
            setTimeout(() => element.classList.remove('highlight'), 1000);
        }

    function autoResizeTextarea(textarea) {

    }

    async function authWithPin(nick, pin) {
        try {
            const res = await fetch('/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ nick, pin }) });
            const data = await res.json();
            if (data.success) {
                currentUser.full_nick = data.full_nick;
                authToken = data.token;
                localStorage.setItem('simply_token', authToken);
                localStorage.setItem('simply_nick', nick);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                if (socket) socket.disconnect();
                socket = io();
                socket.emit('user online', currentUser.full_nick);
                socket.emit('join public');
                
                await setOneSignalUserId(currentUser.full_nick);
                
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
                
                socket.on('message received', (newMsg) => {
                    messages.push(newMsg);
                    renderMessages();
                    if (appSettings.notifications && newMsg.full_nick !== currentUser.full_nick && Notification.permission === 'granted' && document.hidden) {
                        const { nick, tag } = splitFullNick(newMsg.full_nick);
                        if ('serviceWorker' in navigator && navigator.serviceWorker.ready) {
                            navigator.serviceWorker.ready.then(registration => {
                                registration.showNotification('Новое сообщение', {
                                    body: `${nick}${tag}: ${newMsg.text.substring(0, 100)}`,
                                    icon: '/favicon.ico'
                                });
                            });
                        } else {
                            new Notification('Новое сообщение', {
                                body: `${nick}${tag}: ${newMsg.text.substring(0, 100)}`,
                                icon: '/favicon.ico'
                            });
                        }
                    }
                });
                socket.on('message deleted', (msgId) => {
                    messages = messages.filter(m => m.id !== msgId);
                    renderMessages();
                });
                socket.on('message edited', ({messageId, newText}) => {
                    const msg = messages.find(m => m.id === messageId);
                    if (msg) { msg.text = newText; msg.edited = true; renderMessages(); }
                });
                socket.on('reaction updated', ({messageId, reactions}) => {
                    const msg = messages.find(m => m.id === messageId);
                    if (msg) { msg.reactions = reactions; renderMessages(); }
                });
                socket.on('user typing', ({roomId, full_nick}) => {
                    if (roomId === 'public' && full_nick !== currentUser.full_nick) updateTypingIndicator(full_nick);
                });
                socket.on('user stop typing', ({roomId}) => {
                    if (roomId === 'public') updateTypingIndicator(null);
                });
                
                await loadMessages();
                const { nick: n, tag: t } = splitFullNick(currentUser.full_nick);
                document.getElementById('displayNickWithTag').innerHTML = `${escapeHtml(n)}<span style="color:var(--text-secondary);">${escapeHtml(t)}</span>`;
                document.getElementById('showDateToggle').checked = appSettings.showDate !== false;
                document.getElementById('showReactionsToggle').checked = appSettings.showReactions !== false;
                document.getElementById('notificationsToggle').checked = appSettings.notifications !== false;
                
                document.getElementById('showDateToggle').onchange = (e) => {
                    appSettings.showDate = e.target.checked;
                    localStorage.setItem('simply_settings', JSON.stringify(appSettings));
                    renderMessages();
                };
                document.getElementById('showReactionsToggle').onchange = (e) => {
                    appSettings.showReactions = e.target.checked;
                    localStorage.setItem('simply_settings', JSON.stringify(appSettings));
                    renderMessages();
                };
                document.getElementById('notificationsToggle').onchange = (e) => {
                    appSettings.notifications = e.target.checked;
                    localStorage.setItem('simply_settings', JSON.stringify(appSettings));
                };
                
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(() => {
                    if (socket && socket.connected) loadMessages();
                }, 5000);
                
                return true;
            } else {
                document.getElementById('loginError').innerText = data.error || 'Ошибка входа';
                return false;
            }
        } catch(e) {
            document.getElementById('loginError').innerText = 'Ошибка соединения';
            return false;
        }
    }

    window.onload = async () => {
        const logged = await verifyToken();
        if (!logged) {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        } else {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
        }
        document.getElementById('loginBtn').onclick = () => {
            const nick = document.getElementById('loginNick').value.trim();
            const pin = document.getElementById('loginPin').value;
            if (!nick || !pin || pin.length !== 4 || !/^\d+$/.test(pin)) { document.getElementById('loginError').innerText = 'Введите ник и 4-значный PIN'; return; }
            authWithPin(nick, pin);
        };
        document.getElementById('sendBtn').onclick = sendMessage;
        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('input', () => { autoResizeTextarea(messageInput); onTyping(true); });
        messageInput.addEventListener('keypress', (e) => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
        
        const settingsModal = document.getElementById('settingsModal');
        document.getElementById('openSettingsBtn').onclick = () => settingsModal.style.display = 'flex';
        document.getElementById('closeSettingsBtn').onclick = () => settingsModal.style.display = 'none';
        
        document.getElementById('changeNickBtn').onclick = () => {
            settingsModal.style.display = 'none';
            document.getElementById('changeNickModal').style.display = 'flex';
        };
        document.getElementById('changePinBtn').onclick = () => {
            settingsModal.style.display = 'none';
            document.getElementById('changePinModal').style.display = 'flex';
        };
        document.getElementById('applyNickBtn').onclick = async () => { const nn = document.getElementById('newNickInput').value.trim(); if(nn) await changeNick(nn); document.getElementById('changeNickModal').style.display = 'none'; document.getElementById('newNickInput').value = ''; };
        document.getElementById('cancelNickBtn').onclick = () => document.getElementById('changeNickModal').style.display = 'none';
        document.getElementById('applyPinBtn').onclick = async () => { const old=document.getElementById('oldPinInput').value, newP=document.getElementById('newPinInput').value; if(old&&newP&&newP.length===4&&/^\d+$/.test(newP)){ await changePin(old,newP); document.getElementById('changePinModal').style.display='none'; document.getElementById('oldPinInput').value=''; document.getElementById('newPinInput').value=''; } else alert('PIN должен быть 4 цифры'); };
        document.getElementById('cancelPinBtn').onclick = () => document.getElementById('changePinModal').style.display = 'none';
        document.getElementById('closeReactionPickerBtn').onclick = () => document.getElementById('reactionPickerModal').style.display = 'none';
        
        // Исправление порядка удаления: сначала закрываем модалку, потом удаляем
        document.getElementById('confirmOkBtn').onclick = async () => {
            const messageIdToDelete = pendingDeleteMessageId;
            // Сразу закрываем модалку
            document.getElementById('confirmModal').style.display = 'none';
            if (messageIdToDelete) {
                await fetch('/delete-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messageId: messageIdToDelete, full_nick: currentUser.full_nick })
                });
                pendingDeleteMessageId = null;
            }
        };
        document.getElementById('confirmCancelBtn').onclick = () => { pendingDeleteMessageId = null; document.getElementById('confirmModal').style.display = 'none'; };
        
        window.isUserScrolling = false;
        document.getElementById('messagesContainer')?.addEventListener('scroll', () => {
            window.isUserScrolling = true;
            clearTimeout(window.scrollTimeout);
            window.scrollTimeout = setTimeout(() => { window.isUserScrolling = false; }, 200);
        });
        
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                loadMessages();
            }
        });
    };
</script>
</body>
</html>
